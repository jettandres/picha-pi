name: agentic-env

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-env:latest
    container_name: agentic-env
    init: true
    stdin_open: true
    tty: true
    privileged: true
    volumes:
      - ./data:/home/agent/data
      - ${HOME}/.ssh:/home/agent/.ssh:ro
      - ..:/workspace
    env_file:
      - ./secrets/env
    working_dir: /workspace
